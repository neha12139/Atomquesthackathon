<!DOCTYPE html>
<html>

<head>
  <title>GoalSphere Portal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>GoalSphere - Smart Goal Management Portal</h1>

  <div class="card">

    <h2>Login</h2>

    <input id="username" placeholder="Enter Your Name">

    <select id="role">
      <option>Employee</option>
      <option>Manager</option>
      <option>Admin</option>
    </select>

    <button onclick="login()">
      Login
    </button>

  </div>

  <div id="app"></div>

</div>

<script src="script.js"></script>

</body>
</html>
